<!DOCTYPE html>
<html>
<head>
<title>Home</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>

body{
    margin:0;
    font-family:'Poppins', sans-serif;
    background:linear-gradient(135deg,#f4d7de,#f8e6ea);
}

/* container utama */
.container{
    width:80%;
    margin:100px auto;
    background:white;
    border-radius:20px;
    padding:50px;
    box-shadow:0 10px 25px rgba(0,0,0,0.08);
    position:relative;
}

/* header / navbar */
.header{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-bottom:40px;
    position:relative;
    z-index:10;
}

/* logo */
.logo{
    font-size:22px;
    font-weight:600;
    color:#f06292;
}

/* navbar link */
.nav{
    position:relative;
    z-index:10;
}

.nav a{
    text-decoration:none;
    color:#444;
    margin-left:25px;
    font-size:16px;
    transition:0.3s;
}

.nav a:hover{
    color:#f06292;
}

/* hero */
.hero{
    display:flex;
    justify-content:space-between;
    align-items:center;
}

.text-area{
    max-width:500px;
}

.text-area h1{
    font-size:48px;
    color:#f06292;
}

.text-area p{
    font-size:18px;
    color:#555;
}

/* cards */
.cards{
    margin-top:40px;
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
    gap:20px;
}

.card{
    background:#fff5f8;
    padding:20px;
    border-radius:12px;
    text-align:center;
    transition:0.3s;
}

.card:hover{
    transform:translateY(-5px);
    box-shadow:0 8px 18px rgba(0,0,0,0.1);
}

.icon{
    font-size:35px;
    margin-bottom:10px;
}

/* dekorasi */
.decor1{
    position:absolute;
    top:60px;
    right:100px;
    font-size:120px;
    opacity:0.05;
    pointer-events:none;
}

.decor2{
    position:absolute;
    bottom:80px;
    left:120px;
    font-size:100px;
    opacity:0.05;
    pointer-events:none;
}

</style>

</head>

<body>

<div class="decor1">🌸</div>
<div class="decor2">✨</div>

<div class="container">

<div class="header">

<div class="logo">
Yulia Web
</div>

<div class="nav">
<a href="{% url 'home' %}">Home</a>
<a href="{% url 'about' %}">About</a>
<a href="{% url 'contact' %}">Contact</a>
</div>

</div>

<div class="hero">

<div class="text-area">

<h1>Selamat Datang</h1>

<p>Website pribadi Yulia Roslina</p>

<p>Project Django – Pemrograman Internet</p>

</div>

</div>

<div class="cards">

<div class="card">
<div class="icon">🎓</div>
<h3>Mahasiswa</h3>
<p>Teknologi Rekayasa Internet</p>
</div>

<div class="card">
<div class="icon">💻</div>
<h3>Project</h3>
<p>Belajar Django Framework</p>
</div>

<div class="card">
<div class="icon">🌐</div>
<h3>Website</h3>
<p>Portfolio sederhana</p>
</div>

</div>

</div>

</body>
</html>
