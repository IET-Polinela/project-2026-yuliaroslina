<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Akses Ditolak</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f5f7fb;
            margin: 0;
            padding: 0;
        }

        .container {
            max-width: 560px;
            margin: 100px auto;
            background: white;
            padding: 35px;
            border-radius: 14px;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.08);
            text-align: center;
        }

        h1 {
            color: #dc3545;
            margin-bottom: 10px;
        }

        p {
            color: #555;
            line-height: 1.6;
        }

        .btn {
            display: inline-block;
            margin-top: 20px;
            padding: 10px 18px;
            background: #0d6efd;
            color: white;
            text-decoration: none;
            border-radius: 8px;
        }

        .btn:hover {
            background: #0b5ed7;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Akses Ditolak</h1>
        <p>
            Halaman dashboard hanya dapat diakses oleh admin.
            Akun citizen tidak memiliki izin untuk membuka halaman ini.
        </p>
        <a href="/" class="btn">Kembali ke Beranda</a>
    </div>
</body>
</html>
