<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Citizen Portal</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">

    <style>
        body {
            min-height: 100vh;
            background: #f4f6f9;
            font-family: Arial, sans-serif;
        }

        .navbar-custom {
            background: #0d6efd;
            padding: 18px 0;
        }

        .navbar-brand {
            font-size: 24px;
            font-weight: 700;
        }

        #navbarUser {
            font-size: 20px;
            font-weight: 700;
        }

        #app-content {
            padding: 32px 24px;
        }

        .login-page {
            max-width: 620px;
            margin: 80px auto;
        }

        .login-card {
            padding: 45px;
            background: white;
            border-radius: 18px;
        }

        .form-control {
            border-radius: 10px;
            padding: 12px 14px;
        }

        .btn {
            border-radius: 10px;
            font-weight: 600;
        }

        .dashboard-style-grid {
            display: grid;
            grid-template-columns: 240px minmax(0, 1fr);
            gap: 30px;
            align-items: start;
        }

        .left-panel {
            background: white;
            border-radius: 10px;
            padding: 22px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
        }

        .create-report-box {
            width: 100%;
            min-height: 160px;
            border: none;
            border-radius: 10px;
            background: #0d6efd;
            color: white;
            font-size: 28px;
            font-weight: 700;
            line-height: 1.4;
            box-shadow: 0 6px 14px rgba(13, 110, 253, 0.28);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        .create-report-box i {
            font-size: 34px;
            margin-bottom: 8px;
        }

        .status-card {
            margin-top: 28px;
        }

        .status-card h6 {
            font-size: 17px;
            font-weight: 700;
            color: #495057;
            margin-bottom: 18px;
        }

        .status-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 0;
            border-bottom: 1px solid #dee2e6;
            font-size: 18px;
        }

        .status-badge {
            min-width: 26px;
            height: 26px;
            border-radius: 50%;
            display: inline-flex;
            justify-content: center;
            align-items: center;
            color: white;
            font-size: 14px;
            font-weight: 700;
        }

        .main-panel {
            min-width: 0;
        }

        .custom-tabs {
            border-bottom: 1px solid #dee2e6;
            margin-bottom: 30px;
        }

        .custom-tabs .nav-link {
            font-size: 21px;
            font-weight: 700;
            padding: 16px 24px;
            border-radius: 8px 8px 0 0;
        }

        .custom-tabs .nav-link.active {
            color: #0d6efd;
            background: white;
            border-color: #dee2e6 #dee2e6 white;
        }

        .report-grid {
            display: grid;
            grid-template-columns: repeat(2, minmax(0, 1fr));
            gap: 30px;
        }

        .report-card {
            background: white;
            border: none;
            border-radius: 8px;
            padding: 26px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.09);
            min-height: 300px;
        }

        .report-card h5 {
            font-size: 26px;
            font-weight: 800;
        }

        .report-card p {
            font-size: 18px;
        }

        .report-meta-line {
            border-top: 1px solid #ced4da;
            margin-top: 28px;
            padding-top: 16px;
            font-size: 18px;
        }

        .report-category {
            font-size: 16px;
            color: #6c757d;
        }

        .progress-label {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 24px;
            font-size: 15px;
            font-weight: 700;
        }

        .progress {
            height: 8px;
            border-radius: 20px;
            background-color: #e9ecef;
        }

        .progress-bar {
            border-radius: 20px;
        }

        .modal-content {
            border: none;
            border-radius: 16px;
        }

        @media (max-width: 992px) {
            .dashboard-style-grid {
                grid-template-columns: 1fr;
            }

            .report-grid {
                grid-template-columns: 1fr;
            }

            #app-content {
                padding: 24px 14px;
            }

            #navbarUser {
                font-size: 16px;
            }
        }
    </style>
</head>

<body>

    <nav class="navbar navbar-dark navbar-custom shadow-sm">
        <div class="container-fluid px-4 d-flex justify-content-between align-items-center">
            <span class="navbar-brand mb-0">
                <i class="bi bi-buildings-fill me-2"></i>
                Citizen Portal
            </span>

            <div id="nav-menus" class="text-white">
                <div id="navbarUser">
                    <i class="bi bi-person-circle"></i>
                    Halo 👋
                </div>
            </div>
        </div>
    </nav>

    <main id="app-content" class="container-fluid">
        <div class="text-muted">Memuat aplikasi...</div>
    </main>

    <div class="modal fade" id="reportModal" tabindex="-1" aria-labelledby="reportModalLabel" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content">
                <form id="reportForm">
                    <div class="modal-header">
                        <h5 class="modal-title" id="reportModalLabel">Buat Laporan Baru</h5>
                        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Tutup"></button>
                    </div>

                    <div class="modal-body">
                        <div class="mb-3">
                            <label for="inputTitle" class="form-label">Judul Laporan</label>
                            <input type="text" class="form-control" id="inputTitle" required>
                        </div>

                        <div class="mb-3">
                            <label for="inputCategory" class="form-label">Kategori</label>
                            <select class="form-control" id="inputCategory" required>
                                <option value="">Pilih kategori</option>
                                <option value="Infrastruktur">Infrastruktur</option>
                                <option value="Kebersihan">Kebersihan</option>
                                <option value="Keamanan">Keamanan</option>
                                <option value="Fasilitas Umum">Fasilitas Umum</option>
                                <option value="Lainnya">Lainnya</option>
                            </select>
                        </div>

                        <div class="mb-3">
                            <label for="inputLocation" class="form-label">Lokasi</label>
                            <input type="text" class="form-control" id="inputLocation" required>
                        </div>

                        <div class="mb-3">
                            <label for="inputDescription" class="form-label">Deskripsi</label>
                            <textarea class="form-control" id="inputDescription" rows="4" required></textarea>
                        </div>
                    </div>

                    <div class="modal-footer">
                        <button type="button" class="btn btn-light border" id="btnDraft">
                            Simpan Draft
                        </button>
                        <button type="button" class="btn btn-primary" id="btnSubmit">
                            Ajukan
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <script>
        const username = localStorage.getItem("username");
        const navbarUser = document.getElementById("navbarUser");

        if (navbarUser && username) {
            navbarUser.innerHTML =
                `<i class="bi bi-person-circle"></i> Halo, ${username} 👋`;
        }

        document.addEventListener("DOMContentLoaded", function () {
            const inputTitle = document.getElementById("inputTitle");
            const inputCategory = document.getElementById("inputCategory");
            const inputLocation = document.getElementById("inputLocation");
            const inputDescription = document.getElementById("inputDescription");

            window.getReportFormData = function (statusValue) {
                return {
                    title: inputTitle ? inputTitle.value : "",
                    category: inputCategory ? inputCategory.value : "",
                    location: inputLocation ? inputLocation.value : "",
                    description: inputDescription ? inputDescription.value : "",
                    status: statusValue
                };
            };
        });
    </script>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

    <script src="js/api.js?v=1"></script>
    <script src="js/auth.js?v=20"></script>
    <script src="js/app.js?v=40"></script>
    <script src="js/router.js?v=40"></script>

</body>
</html>
