{% extends 'base.html' %}

{% block title %}Hapus Laporan{% endblock %}

{% block content %}
<nav aria-label="breadcrumb" class="mb-3">
    <ol class="breadcrumb small mb-0">
        <li class="breadcrumb-item"><a href="{% url 'report_list' %}">Reports</a></li>
        <li class="breadcrumb-item active text-muted" aria-current="page">Hapus Laporan</li>
    </ol>
</nav>

<div class="row justify-content-center">
    <div class="col-lg-6">
        <div class="card shadow-sm border-danger">
            <div class="card-header bg-danger text-white">
                <h3 class="mb-0">Konfirmasi Hapus Laporan</h3>
            </div>
            <div class="card-body">
                <p class="mb-3">Apakah kamu yakin ingin menghapus laporan ini?</p>

                <div class="alert alert-warning">
                    <strong>{{ report.title }}</strong>
                </div>

                <form method="POST">
                    {% csrf_token %}
                    <div class="d-flex gap-2">
                        <button type="submit" class="btn btn-danger">Ya, Hapus</button>
                        <a href="{% url 'report_list' %}" class="btn btn-secondary">Batal</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
